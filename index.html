              {W.filter(w=>w.g===g).map(w=>{const v=d[w.k];const fi=w.t==="ck"?v===true:(v&&String(v).trim()!=="");const di=lc;const rb=lc?(fi?"#F0FDF4":"#FEF2F2"):"#F9FAFB";const rb2=lc?(fi?"1px solid #BBF7D0":"1px solid #FECACA"):"1px solid #F3F4F6";
                return<div key={w.k} style={{display:"flex",alignItems:"center",gap:12,padding:"8px 12px",background:rb,borderRadius:8,border:rb2,opacity:di?.85:1}}>
                  {lc&&<div style={{width:20,height:20,borderRadius:5,background:fi?"#16A34A":"#EF4444",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:"#fff",fontWeight:800,flexShrink:0}}>{fi?"✓":"!"}</div>}
                  <div style={{minWidth:160,fontSize:12,fontWeight:600,color:"#374151"}}>{w.l}</div>
                  <div style={{flex:1}}>
                    {w.t==="ck"?<label style={{display:"flex",alignItems:"center",gap:6,fontSize:12}}><input type="checkbox" checked={!!d[w.k]} onChange={e=>{if(!di)up(sid,lk,w.k,e.target.checked);}} disabled={di} style={{width:16,height:16,accentColor:l.c}}/><span style={{color:d[w.k]?"#16A34A":"#9CA3AF",fontWeight:700}}>{d[w.k]?"✓ Done":"Pending"}</span></label>
                    :w.t==="sl"?<select value={d[w.k]||""} onChange={e=>{if(!di)up(sid,lk,w.k,e.target.value);}} disabled={di} style={{...s.i,maxWidth:200,fontSize:12,opacity:di?.7:1}}><option value="">Select...</option>{w.o.map(o=><option key={o}>{o}</option>)}</select>
                    :w.t==="ta"?<textarea value={d[w.k]||""} onChange={e=>{if(!di)up(sid,lk,w.k,e.target.value);}} readOnly={di} style={{...s.i,minHeight:36,resize:"vertical",fontSize:12,opacity:di?.7:1}} placeholder="Enter..."/>
                    :w.t==="ur"?<div style={{display:"flex",gap:6}}><input value={d[w.k]||""} onChange={e=>{if(!di)up(sid,lk,w.k,e.target.value);}} readOnly={di} style={{...s.i,fontSize:12,opacity:di?.7:1}} placeholder="G-Drive link..."/>{d[w.k]&&<a href={d[w.k]} target="_blank" rel="noopener noreferrer" style={{background:"#16A34A",color:"#fff",padding:"6px 12px",borderRadius:6,fontSize:11,fontWeight:700,textDecoration:"none",whiteSpace:"nowrap"}}>Open↗</a>}</div>
                    :<input type={w.t==="nm"?"number":"text"} value={d[w.k]||""} onChange={e=>{if(!di)up(sid,lk,w.k,e.target.value);}} readOnly={di} style={{...s.i,maxWidth:w.t==="dt"?170:w.k==="an"?520:120,fontSize:12,opacity:di?.7:1}} placeholder={w.k==="an"?"e.g. APP-2025-123456":""}/>}
                  </div>
                </div>;})}
            </div></div>)}
            {!lc&&<div style={{paddingTop:14,borderTop:"2px solid #F3F4F6",display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}><button onClick={()=>tC(sid,lk)} style={{background:"linear-gradient(135deg,#16A34A,#22C55E)",color:"#fff",border:"none",padding:"10px 24px",borderRadius:10,fontWeight:800,fontSize:14}}>✓ Confirm & Save</button><span style={{fontSize:12,color:"#9CA3AF"}}>Locks fields. Edit later anytime.</span></div>}
            {lc&&<div style={{paddingTop:14,borderTop:"2px solid #F3F4F6",fontSize:12,color:"#6B7280"}}>📊 <strong>{pr}%</strong> — {W.filter(f=>{const v=d[f.k];return f.t==="ck"?v===true:(v&&String(v).trim()!=="");}).length}/{W.length} filled</div>}
          </div>
        </div>;})()}
    </div>
  </div>;
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
